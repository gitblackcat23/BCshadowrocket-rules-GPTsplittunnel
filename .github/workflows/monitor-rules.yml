name: 规则源监控 (预警系统)

on:
  schedule:
    - cron: '0 12 * * *' 
  workflow_dispatch:

# --- 关键：全局强制 Node 24 ---
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 检查外部规则可用性
        id: check_rules
        run: |
          J_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://johnshall.github.io/Shadowrocket-ADBlock-Rules-Forever/sr_cnip_ad.conf)
          O_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/OpenAI/OpenAI.list)
          C_CODE=$(curl -s -o /dev/now -w "%{http_code}" https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Claude/Claude.list)
          
          echo "Johnshall: $J_CODE, OpenAI: $O_CODE, Claude: $C_CODE"
          
          if [ "$J_CODE" != "200" ] || [ "$O_CODE" != "200" ] || [ "$C_CODE" != "200" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: 创建 GitHub Issue 提醒
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ 规则源故障预警：当前已触发降级方案',
              body: `监控到上游源异常，Python 脚本已自动启用本地备份运行。\n\n时间: ${new Date().toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'})}`
            })
