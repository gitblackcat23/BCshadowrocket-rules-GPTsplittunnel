name: 规则源监控 (预警系统)

on:
  # 每天北京时间 08:10 自动运行（UTC 00:10）
  schedule:
    - cron: '10 0 * * *'
  workflow_dispatch:

permissions:
  issues: write

env:
  ALERT_ISSUE_TITLE: '⚠️ 规则源故障预警：当前已触发降级方案'

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 检查外部规则可用性
        id: check_rules
        shell: bash
        run: |
          set -uo pipefail

          work_dir=$(mktemp -d)
          trap 'rm -rf "$work_dir"' EXIT

          fetch() {
            local url=$1
            local output=$2
            curl --silent --show-error --location \
              --retry 2 --retry-all-errors \
              --connect-timeout 15 --max-time 45 \
              --output "$output" --write-out '%{http_code}' "$url" || true
          }

          johnshall_code=$(fetch \
            'https://johnshall.github.io/Shadowrocket-ADBlock-Rules-Forever/sr_cnip_ad.conf' \
            "$work_dir/johnshall.conf")
          vpsdance_code=$(fetch \
            'https://raw.githubusercontent.com/VPSDance/ai-proxy-rules/main/rules/shadowrocket/openai.list' \
            "$work_dir/vpsdance.list")
          v2fly_code=$(fetch \
            'https://raw.githubusercontent.com/v2fly/domain-list-community/master/data/openai' \
            "$work_dir/v2fly-openai")

          failures=()

          if [ "$johnshall_code" != '200' ] || ! grep -Fq '[Rule]' "$work_dir/johnshall.conf"; then
            failures+=("Johnshall：HTTP ${johnshall_code:-000} 或缺少 [Rule]")
          fi
          if [ "$vpsdance_code" != '200' ] || ! grep -Fq 'DOMAIN-SUFFIX,openai.com' "$work_dir/vpsdance.list"; then
            failures+=("VPSDance OpenAI：HTTP ${vpsdance_code:-000} 或缺少 DOMAIN-SUFFIX,openai.com")
          fi
          if [ "$v2fly_code" != '200' ] || ! grep -Eq '(^|[.:])openai\.com([[:space:]]|$)' "$work_dir/v2fly-openai"; then
            failures+=("v2fly OpenAI：HTTP ${v2fly_code:-000} 或缺少 openai.com")
          fi
          echo "Johnshall: $johnshall_code, VPSDance: $vpsdance_code, v2fly: $v2fly_code"

          if [ "${#failures[@]}" -gt 0 ]; then
            {
              echo 'message<<EOF'
              printf '%s\n' "${failures[@]}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: 创建或更新 GitHub Issue 提醒
        if: failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          MONITOR_MESSAGE: ${{ steps.check_rules.outputs.message }}
        with:
          script: |
            const title = process.env.ALERT_ISSUE_TITLE;
            const now = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
            const details = process.env.MONITOR_MESSAGE || '监控步骤异常退出，请查看本次 Actions 日志。';
            const body = [
              '监控到上游源异常，生成器将使用各来源的 last-known-good 缓存维持运行。',
              '',
              `更新时间：${now}`,
              '',
              '```text',
              details,
              '```',
              '',
              `Actions：${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join('\n');

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existing = openIssues.find(issue => !issue.pull_request && issue.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }

      - name: 上游恢复后关闭现有预警
        if: success()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const title = process.env.ALERT_ISSUE_TITLE;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existing = openIssues.find(issue => !issue.pull_request && issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `全部受监控规则源已恢复。恢复时间：${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed'
              });
            }
