name: 规则生成器 CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: rules-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: 设置 Python 环境
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.10'
          cache: pip

      - name: 安装依赖
        run: python -m pip install --requirement requirements.txt

      - name: 运行生成器单元测试
        run: python -m unittest discover -s tests -v

      - name: 校验仓库内规则文件
        run: python update_rules.py --validate-config custom_shadowrocket_rules.conf
