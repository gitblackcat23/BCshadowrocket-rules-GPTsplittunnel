name: 自动更新规则并备份缓存

on:
  # 每天北京时间 08:05 自动运行（UTC 00:05）
  schedule:
    - cron: '5 0 * * *'
  # 允许手动触发执行
  workflow_dispatch:

# 必须开启写入权限，否则无法将变动 push 回仓库
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          # 获取完整历史，确保提交顺畅
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install requests

      - name: 执行更新脚本
        run: |
          python update_rules.py

      - name: 自动提交变动 (包含缓存目录)
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Auto-update rules and sync cache [skip ci]"
          # 指定需要提交的文件和目录
          file_pattern: 'custom_shadowrocket_rules.conf backups/*'
          # 如果没有文件变动，不报错也不提交
          skip_dirty_check: false
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
