name: 自动更新规则并备份缓存

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

# --- 关键：将环境变量提升到这里（全局作用域） ---
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests

      - name: 执行更新脚本
        run: |
          python update_rules.py

      - name: 自动提交变动 (包含缓存目录)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update rules and sync cache (Node 24) [skip ci]"
          file_pattern: 'custom_shadowrocket_rules.conf backups/*'
          skip_dirty_check: false    
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
