name: 自动更新规则并备份缓存

on:
  # 每天北京时间凌晨 4:00 自动运行 (UTC 20:00)
  schedule:
    - cron: '0 20 * * *'
  # 允许手动触发执行
  workflow_dispatch:

# 必须开启写入权限，否则无法将变动 push 回仓库
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # --- 新增：强制启用 Node 24 环境，彻底消除警告 ---
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          # 获取完整历史，确保提交顺畅
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 顺手优化到 3.11，速度更快

      - name: 安装依赖
        run: |
          pip install requests

      - name: 执行更新脚本
        run: |
          python update_rules.py

      - name: 自动提交变动 (包含缓存目录)
        # 这里建议保持 v5，配合上面的 env 开关即可消除警告
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update rules and sync cache [skip ci] (Node 24)"
          # 保留你的核心备份逻辑
          file_pattern: 'custom_shadowrocket_rules.conf backups/*'
          # 如果没有文件变动，不报错也不提交
          skip_dirty_check: false    
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
